<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White background circle -->
  <circle cx="100" cy="100" r="98" fill="#ffffff"/>
  
  <!-- Outer dark ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#2d333b" stroke-width="6"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#2d333b" stroke-width="1.5"/>
  
  <!-- Cyan accent arcs (left and right) -->
  <path d="M 52 52 A 58 58 0 0 1 80 36" fill="none" stroke="#00b8d4" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 148 52 A 58 58 0 0 0 120 36" fill="none" stroke="#00b8d4" stroke-width="4.5" stroke-linecap="round"/>
  
  <!-- IAH3 text -->
  <text x="100" y="48" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="26" font-weight="900" fill="#2d333b" letter-spacing="3">IAH3</text>
  
  <!-- Rocket (top left area) -->
  <g transform="translate(68, 52) rotate(-50)">
    <path d="M 3 0 L 5 -10 L 7 0 Z" fill="#2d333b"/>
    <path d="M 2 0 L 0 3 L 3 1 Z" fill="#2d333b"/>
    <path d="M 8 0 L 10 3 L 7 1 Z" fill="#2d333b"/>
    <line x1="5" y1="-10" x2="5" y2="-14" stroke="#2d333b" stroke-width="0.8" stroke-dasharray="1,1"/>
  </g>
  
  <!-- Stars/sparkles -->
  <circle cx="78" cy="57" r="1.8" fill="#2d333b"/>
  <circle cx="85" cy="62" r="1.2" fill="#2d333b"/>
  <path d="M 92 56 l 1.5 -1.5 l 1.5 1.5 l -1.5 1.5 Z" fill="#2d333b"/>
  <circle cx="105" cy="58" r="1.5" fill="#2d333b"/>
  <circle cx="112" cy="55" r="1.2" fill="#2d333b"/>
  <circle cx="120" cy="60" r="1.8" fill="#2d333b"/>
  
  <!-- Bear - cyan body shadow -->
  <ellipse cx="100" cy="112" rx="32" ry="28" fill="#00b8d4" opacity="0.85"/>
  
  <!-- Bear head - proper fierce bear shape -->
  <!-- Main head shape -->
  <path d="M 80 95 
           C 75 88, 78 78, 85 75
           C 88 72, 92 70, 97 70
           C 102 70, 108 72, 112 75
           C 118 78, 122 85, 120 92
           C 122 96, 123 102, 120 108
           C 118 114, 112 120, 105 122
           C 100 124, 92 122, 87 118
           C 82 114, 78 108, 78 102
           C 77 98, 78 96, 80 95 Z" 
        fill="none" stroke="#2d333b" stroke-width="2.8" stroke-linejoin="round"/>
  
  <!-- Left ear -->
  <path d="M 82 82 C 78 76, 80 70, 86 73" fill="none" stroke="#2d333b" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Right ear -->  
  <path d="M 116 80 C 118 74, 122 72, 120 78" fill="none" stroke="#2d333b" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Eyes - fierce/determined -->
  <ellipse cx="91" cy="92" rx="3" ry="3.5" fill="#2d333b"/>
  <ellipse cx="109" cy="92" rx="3" ry="3.5" fill="#2d333b"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="102" rx="5" ry="3.5" fill="#2d333b"/>
  
  <!-- Mouth/snarl -->
  <path d="M 93 106 C 95 109, 98 110, 100 110 C 102 110, 105 109, 107 106" fill="none" stroke="#2d333b" stroke-width="1.8"/>
  
  <!-- Mane/fur flowing lines (white on cyan) -->
  <path d="M 75 100 C 70 108, 68 118, 72 126" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 78 104 C 74 110, 72 120, 75 128" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 82 108 C 78 114, 77 122, 79 128" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Chin/jaw definition -->
  <path d="M 88 118 C 92 124, 100 126, 108 122" fill="none" stroke="#2d333b" stroke-width="1.5"/>
  
  <!-- Bottom curved text: A TEAM WITH NO LIMITS -->
  <path id="bottomArc" d="M 28 158 A 78 78 0 0 0 172 158" fill="none"/>
  <text font-family="Arial Black, Impact, sans-serif" font-size="11.5" font-weight="900" fill="#2d333b" letter-spacing="2.5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">A TEAM WITH NO LIMITS</textPath>
  </text>
</svg>