<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IXD Systems Dashboard — Site Detail</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav-bar">
    <a href="index.html" class="nav-brand">⚡ <span>IXD</span> Insights</a>
    <div class="nav-links">
      <a href="index.html">Network</a>
      <a href="sites.html">Sites</a>
    </div>
    <div class="nav-status" id="live-clock" style="color:#3fb950;font-weight:600;"></div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Warning banner -->
    <div class="warn-banner hidden" id="warning-banner"></div>

    <!-- Detail content rendered by JS -->
    <div id="detail-content">
      <div class="loading">Loading site detail...</div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/detail.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => SiteDetail.init());
  </script>
  <script src="js/rdu2_enhancements.js"></script>

  <script>
    (function updateClock(){
      var params = new URLSearchParams(window.location.search);
      var siteId = (params.get('id') || '').toUpperCase();
      var tzMap = {'IAH3':'America/Chicago','RDU2':'America/New_York'};
      var tzLabelMap = {'IAH3':'CDT','RDU2':'EDT'};
      var tz = tzMap[siteId] || 'America/New_York';
      var tzLabel = tzLabelMap[siteId] || 'EDT';
      var now = new Date();
      var local = new Date(now.toLocaleString("en-US", {timeZone: tz}));
      var h = String(local.getHours()).padStart(2,'0');
      var m = String(local.getMinutes()).padStart(2,'0');
      var s = String(local.getSeconds()).padStart(2,'0');
      document.getElementById('live-clock').textContent = h + ':' + m + ':' + s + ' ' + tzLabel;
      setTimeout(updateClock, 1000);
    })();
  </script>
</body>
</html>
