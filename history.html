<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IXD Systems Dashboard — Shift History</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav-bar">
    <a href="index.html" class="nav-brand">⚡ <span>IXD</span> Insights</a>
    <div class="nav-links">
      <a href="index.html">Network</a>
      <a href="sites.html">Sites</a>
      <a href="history.html" class="active">Shift History</a>
    </div>
    <div class="nav-status" id="nav-refresh-status"></div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Shift History</h1>
        <p class="page-subtitle">Event CSV exports — view trends and recurring issues</p>
      </div>
    </div>

    <!-- Warning banner -->
    <div class="warn-banner hidden" id="warning-banner"></div>

    <!-- Controls -->
    <div class="history-controls">
      <div class="control-group">
        <label for="history-site-select">Site</label>
        <select id="history-site-select"></select>
      </div>
      <div class="control-group">
        <label for="history-date-start">Start Date</label>
        <input type="date" id="history-date-start">
      </div>
      <div class="control-group">
        <label for="history-date-end">End Date</label>
        <input type="date" id="history-date-end">
      </div>
      <button class="btn-primary" id="history-load-btn">Load Events</button>
    </div>

    <!-- Results -->
    <div id="history-results">
      <div class="loading">Select a site and date range, then click Load Events.</div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/history.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => ShiftHistory.init());
  </script>
</body>
</html>
